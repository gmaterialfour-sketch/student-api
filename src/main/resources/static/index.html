<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .toggle { margin-top: 20px; text-align: center; }
        .toggle a { color: #007bff; cursor: pointer; text-decoration: underline; }
        .form { display: none; }
        .active-form { display: block; }
    </style>
</head>
<body>
<div class="container">
    <h1>Student Portal</h1>

    <!-- Register Form -->
    <div id="registerForm" class="form active-form">
        <h2>Register</h2>
        <form id="register">
            <div class="form-group">
                <label>Roll Number:</label>
                <input type="text" id="regRollNumber" required>
            </div>
            <div class="form-group">
                <label>Aadhaar Number:</label>
                <input type="text" id="regAadhaar" required>
            </div>
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="regName" required>
            </div>
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="regFullName" required>
            </div>
            <div class="form-group">
                <label>Address:</label>
                <input type="text" id="regAddress" required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label>Academic Year (1,2,3,4):</label>
                <input type="number" id="regAcademicYear" min="1" max="4" required>
            </div>
            <div class="form-group">
                <label>Department:</label>
                <select id="regDepartment" required>
                    <option value="">Select Department</option>
                </select>
            </div>
            <div class="form-group">
                <label>Course:</label>
                <select id="regCourse" required>
                    <option value="">Select Course</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="regPassword" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <div id="registerMessage"></div>
        <div class="toggle">Already have an account? <a onclick="showLogin()">Login here</a></div>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="form">
        <h2>Login</h2>
        <form id="login">
            <div class="form-group">
                <label>Roll Number:</label>
                <input type="text" id="loginRollNumber" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div id="loginMessage"></div>
        <div class="toggle">New user? <a onclick="showRegister()">Register here</a></div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api';

    // Load departments on page load
    async function loadDepartments() {
        try {
            const res = await fetch(`${API_BASE}/departments`);
            if (!res.ok) throw new Error('Failed to load departments');
            const departments = await res.json();
            const deptSelect = document.getElementById('regDepartment');
            deptSelect.innerHTML = '<option value="">Select Department</option>';
            departments.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept.code;
                option.textContent = dept.name;
                deptSelect.appendChild(option);
            });
        } catch (err) {
            console.error('Error loading departments:', err);
            document.getElementById('registerMessage').innerHTML = '<div class="error">Failed to load departments. Please refresh.</div>';
        }
    }

    // When department changes, load courses for that department using the public endpoint
    document.getElementById('regDepartment').addEventListener('change', async (e) => {
        const deptCode = e.target.value;
        const courseSelect = document.getElementById('regCourse');
        if (!deptCode) {
            courseSelect.innerHTML = '<option value="">Select Course</option>';
            return;
        }
        try {
            const res = await fetch(`${API_BASE}/public/courses/by-department/${deptCode}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const courses = await res.json();
            courseSelect.innerHTML = '<option value="">Select Course</option>';
            if (courses.length === 0) {
                courseSelect.innerHTML = '<option value="">No courses available</option>';
                return;
            }
            courses.forEach(course => {
                const option = document.createElement('option');
                option.value = course.code;
                option.textContent = `${course.title} (${course.teacher1} / ${course.teacher2})`;
                courseSelect.appendChild(option);
            });
        } catch (err) {
            console.error('Failed to load courses:', err);
            courseSelect.innerHTML = '<option value="">Error loading courses</option>';
        }
    });

    // Register submission
    document.getElementById('register').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            rollNumber: document.getElementById('regRollNumber').value,
            aadhaarNumber: document.getElementById('regAadhaar').value,
            name: document.getElementById('regName').value,
            fullName: document.getElementById('regFullName').value,
            address: document.getElementById('regAddress').value,
            email: document.getElementById('regEmail').value,
            academicYear: parseInt(document.getElementById('regAcademicYear').value),
            departmentCode: document.getElementById('regDepartment').value,
            selectedCourse: document.getElementById('regCourse').value,
            password: document.getElementById('regPassword').value
        };
        try {
            const res = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const text = await res.text();
            if (res.ok) {
                document.getElementById('registerMessage').innerHTML = `<div class="success">${text}</div>`;
                document.getElementById('register').reset();
                setTimeout(() => showLogin(), 2000);
            } else {
                document.getElementById('registerMessage').innerHTML = `<div class="error">${text}</div>`;
            }
        } catch (err) {
            document.getElementById('registerMessage').innerHTML = `<div class="error">Network error</div>`;
        }
    });

    // Login submission (redirects based on role)
    document.getElementById('login').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            rollNumber: document.getElementById('loginRollNumber').value,
            password: document.getElementById('loginPassword').value
        };
        try {
            const res = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                const auth = await res.json();
                localStorage.setItem('token', auth.token);
                localStorage.setItem('role', auth.role);
                if (auth.role === 'ADMIN') {
                    window.location.href = '/admin-dashboard.html';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } else {
                const error = await res.text();
                document.getElementById('loginMessage').innerHTML = `<div class="error">${error}</div>`;
            }
        } catch (err) {
            document.getElementById('loginMessage').innerHTML = `<div class="error">Network error</div>`;
        }
    });

    function showRegister() {
        document.getElementById('registerForm').classList.add('active-form');
        document.getElementById('loginForm').classList.remove('active-form');
    }

    function showLogin() {
        document.getElementById('loginForm').classList.add('active-form');
        document.getElementById('registerForm').classList.remove('active-form');
    }

    loadDepartments();
</script>
</body>
</html>

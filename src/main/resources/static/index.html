<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            margin: 20px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .step { display: none; }
        .step.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select, .checkbox-group {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
        }
        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
            margin-bottom: 0;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; }
        .success { color: #2ecc71; margin-top: 10px; font-size: 14px; }
        .toggle { text-align: center; margin-top: 20px; }
        .toggle a { color: #667eea; cursor: pointer; text-decoration: underline; }
        .form { display: none; }
        .active-form { display: block; }
        .radio-group { display: flex; gap: 20px; align-items: center; }
        .radio-group label { display: inline-flex; align-items: center; gap: 5px; font-weight: normal; margin-bottom: 0; }
        hr { margin: 20px 0; }
        .qualification-group { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .cert-group { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        .otp-group { display: flex; gap: 10px; }
        .otp-group input { flex: 1; }
        .otp-group button { width: auto; padding: 10px 20px; background: #28a745; }
        .resend { background: none; color: #007bff; text-decoration: underline; cursor: pointer; margin-top: 10px; }
        .btn-next { background-color: #28a745; margin-top: 10px; }
        .btn-prev { background-color: #6c757d; margin-top: 10px; }
        .flex-buttons { display: flex; gap: 10px; }
        .flex-buttons button { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <h1>Student Portal</h1>

    <!-- Login Form -->
    <div id="loginForm" class="form active-form">
        <h2>Login</h2>
        <form id="login">
            <div class="form-group"><label>Roll Number:</label><input type="text" id="loginRollNumber" required></div>
            <div class="form-group"><label>Password:</label><input type="password" id="loginPassword" required></div>
            <button type="submit">Login</button>
        </form>
        <div id="loginMessage"></div>
        <div class="toggle">New user? <a onclick="showRegister()">Register here</a></div>
    </div>

    <!-- Registration Form (multi‑step) -->
    <div id="registerForm" class="form">
        <h2>Register</h2>
        <div id="step0" class="step active">
            <h3>Step 1: Basic Information</h3>
            <form id="step0Form">
                <div class="form-group"><label>Aadhaar Number:</label><input type="text" id="regAadhaar" required></div>
                <div class="form-group"><label>Name:</label><input type="text" id="regName" required></div>
                <div class="form-group"><label>Full Name:</label><input type="text" id="regFullName" required></div>
                <div class="form-group"><label>Address:</label><input type="text" id="regAddress" required></div>
                <div class="form-group"><label>Email:</label><input type="email" id="regEmail" required></div>
                <div class="form-group">
                    <label>Gender:</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Male"> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                        <label><input type="radio" name="gender" value="Other"> Other</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Qualification Type:</label>
                    <select id="qualType" required>
                        <option value="">Select</option>
                        <option value="12TH">12th (Plus Two)</option>
                        <option value="ITI">ITI</option>
                        <option value="DIPLOMA">Diploma</option>
                    </select>
                </div>
                <div class="flex-buttons">
                    <button type="button" class="btn-next" onclick="goToStep1()">Next</button>
                </div>
            </form>
            <div id="step0Message"></div>
        </div>

        <div id="step1" class="step">
            <h3>Step 2: Qualification Details</h3>
            <div id="qualificationDetails"></div>
            <div class="flex-buttons">
                <button type="button" class="btn-prev" onclick="goToStep0()">Back</button>
                <button type="button" class="btn-next" onclick="goToStep2()">Next</button>
            </div>
            <div id="step1Message"></div>
        </div>

        <div id="step2" class="step">
            <h3>Step 3: Department & Courses</h3>
            <div class="form-group">
                <label>Department:</label>
                <select id="regDepartment" required><option value="">Select Department</option></select>
            </div>
            <div class="form-group">
                <label>Courses (select multiple):</label>
                <div id="regCourses" class="checkbox-group"></div>
            </div>
            <div class="form-group"><label>Password:</label><input type="password" id="regPassword" required></div>
            <div class="cert-group">
                <h3>Upload Certificates</h3>
                <div id="certUploads"></div>
            </div>
            <div class="form-group"><label>Profile Photo (optional):</label><input type="file" id="regPhoto" accept="image/*"></div>
            <div class="flex-buttons">
                <button type="button" class="btn-prev" onclick="goToStep1()">Back</button>
                <button type="button" class="btn-next" onclick="nextStep()">Next: Verify Email</button>
            </div>
            <div id="step2Message"></div>
        </div>

        <div id="step3" class="step">
            <h3>Step 4: Email Verification</h3>
            <p>We have sent a 6‑digit OTP to <span id="otpEmail"></span>.</p>
            <div class="form-group">
                <label>Enter OTP:</label>
                <div class="otp-group">
                    <input type="text" id="otpInput" maxlength="6" placeholder="123456">
                    <button type="button" id="verifyOtpBtn" onclick="verifyOtp()">Verify OTP</button>
                </div>
                <div class="resend" onclick="resendOtp()">Resend OTP</div>
            </div>
            <div id="otpMessage"></div>
            <div class="toggle" style="margin-top: 20px;">
                <a onclick="goBackToStep2()">← Back to registration</a>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api';
    let registrationData = {
        aadhaarNumber: '',
        name: '',
        fullName: '',
        address: '',
        email: '',
        gender: '',
        qualificationType: '',
        selectedCourses: [],
        departmentCode: '',
        password: '',
        tenthBoard: '',
        tenthYear: 0,
        tenthPercentage: 0,
        twelfthBoard: '',
        twelfthYear: 0,
        twelfthPercentage: 0,
        twelfthStream: '',
        itiTrade: '',
        itiYear: 0,
        itiPercentage: 0,
        diplomaBranch: '',
        diplomaCredits: 0,
        diplomaYear: 0,
        diplomaPercentage: 0
    };
    let registrationFiles = {
        photo: null,
        cert10: null,
        cert12: null,
        certIti: null,
        certDiploma: null
    };

    // Helper to switch steps
    function showStep(stepId) {
        document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
        document.getElementById(stepId).classList.add('active');
    }

    // Step 0 to Step 1: store basic info and qualification type
    function goToStep1() {
        const aadhaar = document.getElementById('regAadhaar').value;
        const name = document.getElementById('regName').value;
        const fullName = document.getElementById('regFullName').value;
        const address = document.getElementById('regAddress').value;
        const email = document.getElementById('regEmail').value;
        const genderElem = document.querySelector('input[name="gender"]:checked');
        const qualType = document.getElementById('qualType').value;

        if (!aadhaar || !name || !fullName || !address || !email || !genderElem || !qualType) {
            document.getElementById('step0Message').innerHTML = '<div class="error">Please fill all fields.</div>';
            return;
        }
        if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
            document.getElementById('step0Message').innerHTML = '<div class="error">Please enter a valid email address.</div>';
            return;
        }

        registrationData.aadhaarNumber = aadhaar;
        registrationData.name = name;
        registrationData.fullName = fullName;
        registrationData.address = address;
        registrationData.email = email;
        registrationData.gender = genderElem.value;
        registrationData.qualificationType = qualType;

        // Build step 1 fields based on qualification type
        const container = document.getElementById('qualificationDetails');
        if (qualType === '12TH') {
            container.innerHTML = `
                <div class="form-group"><label>10th Board:</label><input type="text" id="tenthBoard" required></div>
                <div class="form-group"><label>10th Year:</label><input type="number" id="tenthYear" required></div>
                <div class="form-group"><label>10th Percentage:</label><input type="number" step="any" id="tenthPercentage" required></div>
                <div class="form-group"><label>12th Board:</label><input type="text" id="twelfthBoard" required></div>
                <div class="form-group"><label>12th Year:</label><input type="number" id="twelfthYear" required></div>
                <div class="form-group"><label>12th Percentage:</label><input type="number" step="any" id="twelfthPercentage" required></div>
                <div class="form-group"><label>Stream (e.g., Bio Maths, Bio Chemistry, Computer Science):</label><input type="text" id="twelfthStream" required></div>
            `;
        } else if (qualType === 'ITI') {
            container.innerHTML = `
                <div class="form-group"><label>10th Board:</label><input type="text" id="tenthBoard" required></div>
                <div class="form-group"><label>10th Year:</label><input type="number" id="tenthYear" required></div>
                <div class="form-group"><label>10th Percentage:</label><input type="number" step="any" id="tenthPercentage" required></div>
                <div class="form-group"><label>ITI Trade:</label>
                    <select id="itiTrade" required>
                        <option value="">Select Trade</option>
                        <option value="Fitter">Fitter</option>
                        <option value="Electrician">Electrician</option>
                        <option value="Welder">Welder</option>
                        <option value="Mechanic">Mechanic</option>
                        <option value="Computer Operator">Computer Operator</option>
                    </select>
                </div>
                <div class="form-group"><label>ITI Year:</label><input type="number" id="itiYear" required></div>
                <div class="form-group"><label>ITI Percentage:</label><input type="number" step="any" id="itiPercentage" required></div>
            `;
        } else if (qualType === 'DIPLOMA') {
            container.innerHTML = `
                <div class="form-group"><label>10th Board:</label><input type="text" id="tenthBoard" required></div>
                <div class="form-group"><label>10th Year:</label><input type="number" id="tenthYear" required></div>
                <div class="form-group"><label>10th Percentage:</label><input type="number" step="any" id="tenthPercentage" required></div>
                <div class="form-group"><label>Diploma Branch:</label>
                    <select id="diplomaBranch" required>
                        <option value="">Select Branch</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Electronics & Communication">Electronics & Communication</option>
                        <option value="Civil">Civil</option>
                        <option value="Automobile">Automobile</option>
                        <option value="Electrical">Electrical</option>
                    </select>
                </div>
                <div class="form-group"><label>Diploma Credits:</label><input type="number" id="diplomaCredits" required></div>
                <div class="form-group"><label>Diploma Year:</label><input type="number" id="diplomaYear" required></div>
                <div class="form-group"><label>Diploma Percentage:</label><input type="number" step="any" id="diplomaPercentage" required></div>
            `;
        }
        showStep('step1');
    }

    function goToStep0() { showStep('step0'); }

    // Step 1 to Step 2: collect qualification data
    function goToStep2() {
        const qualType = registrationData.qualificationType;
        const tenthBoard = document.getElementById('tenthBoard')?.value;
        const tenthYear = document.getElementById('tenthYear')?.value;
        const tenthPercentage = document.getElementById('tenthPercentage')?.value;
        if (!tenthBoard || !tenthYear || !tenthPercentage) {
            document.getElementById('step1Message').innerHTML = '<div class="error">Please fill 10th details.</div>';
            return;
        }
        registrationData.tenthBoard = tenthBoard;
        registrationData.tenthYear = parseInt(tenthYear);
        registrationData.tenthPercentage = parseFloat(tenthPercentage);

        if (qualType === '12TH') {
            const twelfthBoard = document.getElementById('twelfthBoard')?.value;
            const twelfthYear = document.getElementById('twelfthYear')?.value;
            const twelfthPercentage = document.getElementById('twelfthPercentage')?.value;
            const twelfthStream = document.getElementById('twelfthStream')?.value;
            if (!twelfthBoard || !twelfthYear || !twelfthPercentage || !twelfthStream) {
                document.getElementById('step1Message').innerHTML = '<div class="error">Please fill 12th details.</div>';
                return;
            }
            registrationData.twelfthBoard = twelfthBoard;
            registrationData.twelfthYear = parseInt(twelfthYear);
            registrationData.twelfthPercentage = parseFloat(twelfthPercentage);
            registrationData.twelfthStream = twelfthStream;
        } else if (qualType === 'ITI') {
            const itiTrade = document.getElementById('itiTrade')?.value;
            const itiYear = document.getElementById('itiYear')?.value;
            const itiPercentage = document.getElementById('itiPercentage')?.value;
            if (!itiTrade || !itiYear || !itiPercentage) {
                document.getElementById('step1Message').innerHTML = '<div class="error">Please fill ITI details.</div>';
                return;
            }
            registrationData.itiTrade = itiTrade;
            registrationData.itiYear = parseInt(itiYear);
            registrationData.itiPercentage = parseFloat(itiPercentage);
        } else if (qualType === 'DIPLOMA') {
            const diplomaBranch = document.getElementById('diplomaBranch')?.value;
            const diplomaCredits = document.getElementById('diplomaCredits')?.value;
            const diplomaYear = document.getElementById('diplomaYear')?.value;
            const diplomaPercentage = document.getElementById('diplomaPercentage')?.value;
            if (!diplomaBranch || !diplomaCredits || !diplomaYear || !diplomaPercentage) {
                document.getElementById('step1Message').innerHTML = '<div class="error">Please fill Diploma details.</div>';
                return;
            }
            registrationData.diplomaBranch = diplomaBranch;
            registrationData.diplomaCredits = parseInt(diplomaCredits);
            registrationData.diplomaYear = parseInt(diplomaYear);
            registrationData.diplomaPercentage = parseFloat(diplomaPercentage);
        }

        // Load departments and courses for step 2
        loadDepartments();
        // Prepare certificate upload section based on qualification type
        const certDiv = document.getElementById('certUploads');
        if (qualType === '12TH') {
            certDiv.innerHTML = `
                <div><label>10th Marksheet (PDF):</label><input type="file" id="cert10" accept="application/pdf"></div>
                <div><label>12th Marksheet (PDF):</label><input type="file" id="cert12" accept="application/pdf"></div>
            `;
        } else if (qualType === 'ITI') {
            certDiv.innerHTML = `
                <div><label>10th Marksheet (PDF):</label><input type="file" id="cert10" accept="application/pdf"></div>
                <div><label>ITI Certificate (PDF):</label><input type="file" id="certIti" accept="application/pdf"></div>
            `;
        } else if (qualType === 'DIPLOMA') {
            certDiv.innerHTML = `
                <div><label>10th Marksheet (PDF):</label><input type="file" id="cert10" accept="application/pdf"></div>
                <div><label>Diploma Certificate (PDF):</label><input type="file" id="certDiploma" accept="application/pdf"></div>
            `;
        }
        showStep('step2');
    }

  async function loadDepartments() {
    try {
        const res = await fetch(`${API_BASE}/departments`);
        if (!res.ok) {
            console.error('Departments fetch failed:', res.status);
            return;
        }
        const departments = await res.json();
        console.log('Departments loaded:', departments);
        const deptSelect = document.getElementById('regDepartment');
        deptSelect.innerHTML = '<option value="">Select Department</option>';
        departments.forEach(dept => {
            const option = document.createElement('option');
            option.value = dept.code;
            option.textContent = dept.name;
            deptSelect.appendChild(option);
        });
    } catch (err) {
        console.error('Error loading departments:', err);
    }
}
    

    document.getElementById('regDepartment').addEventListener('change', async (e) => {
        const deptCode = e.target.value;
        const coursesDiv = document.getElementById('regCourses');
        if (!deptCode) { coursesDiv.innerHTML = '<em>Select a department first</em>'; return; }
        const res = await fetch(`${API_BASE}/public/courses/by-department/${deptCode}`);
        const courses = await res.json();
        if (courses.length === 0) { coursesDiv.innerHTML = '<em>No courses available</em>'; return; }
        coursesDiv.innerHTML = '';
        courses.forEach(course => {
            const label = document.createElement('label');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = course.code;
            label.appendChild(cb);
            label.appendChild(document.createTextNode(` ${course.title} (${course.teacher1} / ${course.teacher2})`));
            coursesDiv.appendChild(label);
        });
    });

    // Step 2 to Step 3: collect department, courses, password, files, and send OTP
    function nextStep() {
        const department = document.getElementById('regDepartment').value;
        const selectedCourses = Array.from(document.querySelectorAll('#regCourses input:checked')).map(cb => cb.value);
        const password = document.getElementById('regPassword').value;
        if (!department) {
            document.getElementById('step2Message').innerHTML = '<div class="error">Please select department.</div>';
            return;
        }
        if (selectedCourses.length === 0) {
            document.getElementById('step2Message').innerHTML = '<div class="error">Please select at least one course.</div>';
            return;
        }
        if (!password) {
            document.getElementById('step2Message').innerHTML = '<div class="error">Please enter password.</div>';
            return;
        }
        registrationData.departmentCode = department;
        registrationData.selectedCourses = selectedCourses;
        registrationData.password = password;

        // Gather files
        registrationFiles.photo = document.getElementById('regPhoto').files[0];
        registrationFiles.cert10 = document.getElementById('cert10')?.files[0];
        if (registrationData.qualificationType === '12TH') {
            registrationFiles.cert12 = document.getElementById('cert12')?.files[0];
        } else if (registrationData.qualificationType === 'ITI') {
            registrationFiles.certIti = document.getElementById('certIti')?.files[0];
        } else if (registrationData.qualificationType === 'DIPLOMA') {
            registrationFiles.certDiploma = document.getElementById('certDiploma')?.files[0];
        }

        // Send OTP
        sendOtp(registrationData.email);
        document.getElementById('otpEmail').innerText = registrationData.email;
        showStep('step3');
    }

    async function sendOtp(email) {
        try {
            const res = await fetch(`${API_BASE}/otp/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('step2Message').innerHTML = `<div class="error">${data.message || 'Failed to send OTP'}</div>`;
                showStep('step2');
            }
        } catch (err) {
            console.error(err);
        }
    }

    async function resendOtp() {
        await sendOtp(registrationData.email);
        document.getElementById('otpMessage').innerHTML = '<div class="success">OTP resent. Check your email.</div>';
    }

    async function verifyOtp() {
        const otp = document.getElementById('otpInput').value;
        if (!otp) {
            document.getElementById('otpMessage').innerHTML = '<div class="error">Please enter OTP</div>';
            return;
        }
        // Verify OTP
        try {
            const res = await fetch(`${API_BASE}/otp/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: registrationData.email, otp: otp })
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('otpMessage').innerHTML = `<div class="error">${data.message || 'Invalid OTP'}</div>`;
                return;
            }
            // OTP verified, now submit registration
            const formData = new FormData();
            formData.append('student', new Blob([JSON.stringify(registrationData)], { type: 'application/json' }));
            if (registrationFiles.photo) formData.append('photo', registrationFiles.photo);
            if (registrationFiles.cert10) formData.append('cert10', registrationFiles.cert10);
            if (registrationFiles.cert12) formData.append('cert12', registrationFiles.cert12);
            if (registrationFiles.certIti) formData.append('certIti', registrationFiles.certIti);
            if (registrationFiles.certDiploma) formData.append('certDiploma', registrationFiles.certDiploma);

            const regRes = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                body: formData
            });
            const regText = await regRes.text();
            if (regRes.ok) {
                document.getElementById('otpMessage').innerHTML = `<div class="success">${regText}</div>`;
                setTimeout(() => {
                    showLogin();
                }, 2000);
            } else {
                document.getElementById('otpMessage').innerHTML = `<div class="error">${regText}</div>`;
            }
        } catch (err) {
            document.getElementById('otpMessage').innerHTML = '<div class="error">Network error. Please try again.</div>';
        }
    }

    function goBackToStep2() {
        showStep('step2');
    }

    // Login submit
    document.getElementById('login').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = { rollNumber: document.getElementById('loginRollNumber').value, password: document.getElementById('loginPassword').value };
        try {
            const res = await fetch(`${API_BASE}/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if (res.ok) {
                const auth = await res.json();
                localStorage.setItem('token', auth.token);
                localStorage.setItem('role', auth.role);
                window.location.href = auth.role === 'ADMIN' ? '/admin-dashboard.html' : '/dashboard.html';
            } else {
                const error = await res.text();
                document.getElementById('loginMessage').innerHTML = `<div class="error">${error}</div>`;
            }
        } catch (err) {
            document.getElementById('loginMessage').innerHTML = `<div class="error">Network error</div>`;
        }
    });

    function showRegister() {
        document.getElementById('loginForm').classList.remove('active-form');
        document.getElementById('registerForm').classList.add('active-form');
        showStep('step0');
        // Reset data
        registrationData = {};
        registrationFiles = {};
        document.getElementById('step0Form').reset();
        document.getElementById('qualificationDetails').innerHTML = '';
        document.getElementById('regDepartment').innerHTML = '<option value="">Select Department</option>';
        document.getElementById('regCourses').innerHTML = '';
        document.getElementById('certUploads').innerHTML = '';
    }
    function showLogin() {
        document.getElementById('registerForm').classList.remove('active-form');
        document.getElementById('loginForm').classList.add('active-form');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 600px; margin: auto; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        .info { margin-bottom: 10px; }
        .label { font-weight: bold; }
        .logout { margin-top: 20px; }
        button { padding: 8px 16px; background-color: #dc3545; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #c82333; }
        .error { color: red; }
    </style>
</head>
<body>
<div class="container">
    <h1>Student Dashboard</h1>
    <div id="dashboard" class="card">
        <div class="info"><span class="label">Name:</span> <span id="name"></span></div>
        <div class="info"><span class="label">Roll Number:</span> <span id="rollNumber"></span></div>
        <div class="info"><span class="label">Course:</span> <span id="course"></span></div>
        <div class="info"><span class="label">Department:</span> <span id="department"></span></div>
        <div class="info"><span class="label">Full Name:</span> <span id="fullName"></span></div>
        <div class="info"><span class="label">Address:</span> <span id="address"></span></div>
        <div class="info"><span class="label">Academic Year:</span> <span id="academicYear"></span></div>
    </div>
    <div class="logout">
        <button onclick="logout()">Logout</button>
    </div>
    <div id="error" class="error"></div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api';
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');

    if (!token) {
        window.location.href = '/index.html';
    }

    async function fetchProfile() {
        try {
            const res = await fetch(`${API_BASE}/student/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const student = await res.json();
                document.getElementById('name').innerText = student.name;
                document.getElementById('rollNumber').innerText = student.rollNumber;
                document.getElementById('course').innerText = student.selectedCourse;
                document.getElementById('department').innerText = student.department?.name || student.department;
                document.getElementById('fullName').innerText = student.fullName;
                document.getElementById('address').innerText = student.address;
                document.getElementById('academicYear').innerText = student.academicYear;
            } else {
                throw new Error('Failed to load profile');
            }
        } catch (err) {
            document.getElementById('error').innerText = 'Error loading dashboard. Please login again.';
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            setTimeout(() => window.location.href = '/index.html', 2000);
        }
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('role');
        window.location.href = '/index.html';
    }

    fetchProfile();
</script>
</body>
</html>
